services:
  backend-demo:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      STORAGE_MODE: memory
      DEMO_MODE: "true"
      ENABLE_SCHEDULER: "false"
      ENABLE_DEBUG_ENDPOINTS: "true"
      ENABLE_TELEGRAM_NOTIFICATIONS: "false"
      NOTIFY_ON_NEW_PROPOSAL: "true"
      LIDO_ALLOWED_PUBLISHERS: '["Allowed Publisher"]'
      LOG_LEVEL: info
    command: npm run demo:api
