services:
  backend:
    build:
      context: .
      target: dev
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      STORAGE_MODE: ${STORAGE_MODE:-memory}
      DEMO_MODE: ${DEMO_MODE:-true}
      ENABLE_SCHEDULER: ${ENABLE_SCHEDULER:-false}
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
